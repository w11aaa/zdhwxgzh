services:
  xhs-web:
    build: .
    container_name: xhs-ai-publisher-web
    ports:
      - "8000:8000"
    environment:
      XHS_DATA_DIR: /data
      XHS_HEADLESS: "true"
      XHS_WEB_HOST: 0.0.0.0
      XHS_WEB_PORT: "8000"
      XHS_WEB_DEBUG: "false"
      XHS_WEB_RELOAD: "false"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      - ./docker-data:/data
      - ./output:/app/output
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
