[pytest]
minversion = 6.0
testpaths = tests
norecursedirs = tests/manual venv .git output reports
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --maxfail=5
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    browser: 浏览器测试
    database: 数据库测试
    network: 网络测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
